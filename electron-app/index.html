<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  /* ============================================
     AI Traffic Light - Flat Style
     主窗口：只显示红绿灯，无设置面板
     ============================================ */

  :root {
    --scale: 2.5;
    --padding: calc(8px * var(--scale));
    --light-spacing: calc(6px * var(--scale));
    --light-size: calc(16px * var(--scale));
    --single-light-size: calc(22px * var(--scale));
    --widget-radius: calc(20px * var(--scale));
    --glow-spread: calc(10px * var(--scale));
  }

  /* Theme - Light */
  :root {
    --bg-widget: #FFFFFF;
    --border-default: #D2D2D7;
    --red-on: #FF3B30;
    --red-off: #FFE5E3;
    --red-glow: #FF6B64;
    --yellow-on: #FFCC00;
    --yellow-off: #FFF8E1;
    --yellow-glow: #FFE066;
    --green-on: #34C759;
    --green-off: #E3F7E8;
    --green-glow: #5FD47A;
    --shadow-widget: 0 2px 8px rgba(0,0,0,0.08);
    --transition-theme: 250ms ease-out;
  }

  /* Theme - Dark */
  [data-theme="dark"] {
    --bg-widget: #1D1D1F;
    --border-default: #424245;
    --red-on: #FF453A;
    --red-off: #3A0F0C;
    --red-glow: #FF6B64;
    --yellow-on: #FFD60A;
    --yellow-off: #3D3300;
    --yellow-glow: #FFE44D;
    --green-on: #30D158;
    --green-off: #0A2E14;
    --green-glow: #5FD47A;
    --shadow-widget: 0 2px 8px rgba(0,0,0,0.24);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: transparent;
    overflow: hidden;
    user-select: none;
  }

  /* Widget container - draggable */
  .tl-widget {
    position: absolute;
    left: 0; top: 0;
    background: var(--bg-widget);
    border: 1px solid var(--border-default);
    border-radius: var(--widget-radius);
    padding: var(--padding);
    box-shadow: var(--shadow-widget);
    cursor: default;
    transition: background var(--transition-theme), border-color var(--transition-theme), box-shadow var(--transition-theme);
    -webkit-app-region: drag;
  }

  .tl-lights {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--light-spacing);
  }
  .tl-lights.single-mode { gap: 0; }

  /* Individual light */
  .tl-light {
    width: var(--light-size); height: var(--light-size);
    border-radius: 50%;
    position: relative;
    transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 300ms cubic-bezier(0.4, 0, 0.2, 1);
    -webkit-app-region: no-drag;
  }

  /* Specular highlight */
  .tl-light::after {
    content: "";
    position: absolute;
    top: calc(var(--light-size) * 0.125);
    left: calc(var(--light-size) * 0.125);
    width: calc(var(--light-size) * 0.375);
    height: calc(var(--light-size) * 0.25);
    border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.85), transparent 70%);
    pointer-events: none;
  }

  .single-mode .tl-light {
    width: var(--single-light-size); height: var(--single-light-size);
  }
  .single-mode .tl-light::after {
    top: calc(var(--single-light-size) * 0.136);
    left: calc(var(--single-light-size) * 0.136);
    width: calc(var(--single-light-size) * 0.36);
    height: calc(var(--single-light-size) * 0.23);
  }

  /* Light state colors */
  .tl-light.red { background: var(--red-off); }
  .tl-light.red.on { background: var(--red-on); box-shadow: 0 0 var(--glow-spread) var(--red-glow); }
  .tl-light.yellow { background: var(--yellow-off); }
  .tl-light.yellow.on { background: var(--yellow-on); box-shadow: 0 0 var(--glow-spread) var(--yellow-glow); }
  .tl-light.green { background: var(--green-off); }
  .tl-light.green.on { background: var(--green-on); box-shadow: 0 0 var(--glow-spread) var(--green-glow); }

  /* Animations */
  @keyframes breathing {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }
  @keyframes blinking {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0.2; }
  }
  .tl-light.breathing { animation: breathing 2400ms ease-in-out infinite; }
  .tl-light.blinking { animation: blinking 800ms step-end infinite; }

  /* 切换主题时临时禁用 transition，避免与 animation 冲突 */
  body.no-transition,
  body.no-transition .tl-widget,
  body.no-transition .tl-light,
  body.no-transition * {
    transition: none !important;
  }
</style>
</head>
<body data-theme="dark">

<!-- Traffic Light Widget -->
<div class="tl-widget" id="tlWidget">
  <div class="tl-lights" id="tlLights">
    <div class="tl-light red" id="lightRed"></div>
    <div class="tl-light yellow" id="lightYellow"></div>
    <div class="tl-light green on" id="lightGreen"></div>
  </div>
</div>

<script>
  // ============================================
  // 状态
  // ============================================
  let currentColor = 'green';
  let isSingleMode = false;
  let isDark = true;
  let isPinned = true;
  let isSettingsOpen = false;

  const widget = document.getElementById('tlWidget');
  const lights = document.getElementById('tlLights');
  const lightRed = document.getElementById('lightRed');
  const lightYellow = document.getElementById('lightYellow');
  const lightGreen = document.getElementById('lightGreen');

  // ============================================
  // 初始化
  // ============================================
  async function init() {
    try {
      const config = await window.trafficLightAPI.getConfig();
      document.documentElement.style.setProperty('--scale', config.scale);
      setTheme(config.theme === 'dark' ? 'dark' : 'light');
    } catch(e) { console.error('Init error:', e); }
    updateLights();
    // 延迟计算窗口大小（等CSS变量生效）
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        resizeWindow();
      });
    });
  }

  // 窗口大小只匹配红绿灯本体
  function resizeWindow() {
    const w = widget.offsetWidth + 4;
    const h = widget.offsetHeight + 4;
    window.trafficLightAPI.adjustWindow(w, h);
  }

  // ============================================
  // 监听外部 API 状态变化
  // ============================================
  window.trafficLightAPI.onStatusChange((data) => {
    if (data.color && ['red','yellow','green'].includes(data.color)) {
      setState(data.color);
    }
  });

  // 监听设置面板的变更
  window.trafficLightAPI.onStateUpdate((data) => {
    if ('singleLight' in data) {
      isSingleMode = data.singleLight;
      applySingleMode();
    }
    if ('theme' in data) {
      setTheme(data.theme);
    }
    if ('alwaysOnTop' in data) {
      isPinned = data.alwaysOnTop;
    }
  });

  // 监听设置面板关闭
  window.trafficLightAPI.onSettingsClosed(() => {
    isSettingsOpen = false;
  });

  // ============================================
  // 状态管理
  // ============================================
  function setState(color) {
    currentColor = color;
    updateLights();
  }

  function updateLights() {
    [lightRed, lightYellow, lightGreen].forEach(l => {
      l.classList.remove('on', 'breathing', 'blinking');
    });

    if (currentColor === 'red') {
      lightRed.classList.add('on', 'breathing');
    } else if (currentColor === 'yellow') {
      lightYellow.classList.add('on', 'blinking');
    } else if (currentColor === 'green') {
      lightGreen.classList.add('on');
    }

    if (isSingleMode) {
      lightRed.style.display = currentColor === 'red' ? '' : 'none';
      lightYellow.style.display = currentColor === 'yellow' ? '' : 'none';
      lightGreen.style.display = currentColor === 'green' ? '' : 'none';
    }

    window.trafficLightAPI.updateState({ color: currentColor });
  }

  // ============================================
  // 单灯模式
  // ============================================
  function applySingleMode() {
    lights.classList.toggle('single-mode', isSingleMode);
    if (isSingleMode) {
      lightRed.style.display = currentColor === 'red' ? '' : 'none';
      lightYellow.style.display = currentColor === 'yellow' ? '' : 'none';
      lightGreen.style.display = currentColor === 'green' ? '' : 'none';
    } else {
      lightRed.style.display = '';
      lightYellow.style.display = '';
      lightGreen.style.display = '';
    }
    // 模式切换后重新调整窗口大小
    setTimeout(resizeWindow, 350);
  }

  // ============================================
  // 主题
  // ============================================
  function setTheme(theme) {
    if (document.body.getAttribute('data-theme') === theme) return;
    isDark = theme === 'dark';

    // 临时禁用 transition，避免与 animation 冲突导致闪烁
    document.body.classList.add('no-transition');
    document.body.offsetHeight; // 强制重绘
    document.body.setAttribute('data-theme', theme);
    document.body.offsetHeight; // 强制重绘
    requestAnimationFrame(() => {
      document.body.classList.remove('no-transition');
    });

    window.trafficLightAPI.updateState({ theme: theme });
  }

  // ============================================
  // 事件监听
  // ============================================

  // 右键 → 打开设置面板
  widget.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    isSettingsOpen = true;
    window.trafficLightAPI.toggleSettings();
  });

  // 左键点击 → 关闭设置面板
  document.addEventListener('mousedown', (e) => {
    if (isSettingsOpen && e.button === 0) {
      window.trafficLightAPI.closeSettings();
      isSettingsOpen = false;
    }
  });

  // ============================================
  // 启动
  // ============================================
  init();
</script>

</body>
</html>
